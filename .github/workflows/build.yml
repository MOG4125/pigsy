name: Build Pigsy Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Manual Submodule Init
        run: |
          git submodule update --init --recursive
          ls -R  # This will list files to confirm cplug exists

      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          cmake --build . --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Pigsy-Plugin-${{ matrix.os }}
          path: build/
