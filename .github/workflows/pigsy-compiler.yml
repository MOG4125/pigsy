name: Pigsy Standalone Apps & Plugins (With UI)

on:
  push:
    paths:
      - '**.pd'
      - 'config.json'
      - '.github/workflows/pigsy-apps-with-ui.yml'

jobs:
  build-windows-suite:
    name: Build Windows App Suite
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Toolchain
      run: pip install hvcc
    - name: Parse Configuration Maps
      shell: bash
      run: |
        FOLDER=$(python3 -c "import json; print(json.load(open('config.json'))['folder_path'])")
        PATCH=$(python3 -c "import json; print(json.load(open('config.json'))['target_patch_file'])")
        NAME="${PATCH%.*}"
        echo "TARGET_PATCH=$FOLDER/$PATCH" >> $GITHUB_ENV
        echo "BINARY_NAME=$NAME" >> $GITHUB_ENV
    - name: Translate to JUCE C++ (UI Supported)
      run: hvcc "${{ env.TARGET_PATCH }}" -g juce -o build/compiled_source --n "${{ env.BINARY_NAME }}"
    - name: Package Embedded UI Images
      shell: bash
      run: |
        mkdir -p build/compiled_source/resources
        FOLDER=$(python3 -c "import json; print(json.load(open('config.json'))['folder_path'])")
        find "$FOLDER" -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -exec cp {} build/compiled_source/resources/ \;
    - name: Compile Windows Deliverables
      shell: cmd
      run: |
        cd build\compiled_source && mkdir cmake-build && cd cmake-build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release
    - name: Upload Windows Interactive Deliverables
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BINARY_NAME }}-Windows-UI-Package
        path: |
          build/compiled_source/cmake-build/Release/*.exe
          build/compiled_source/cmake-build/Release/*.vst3
          build/compiled_source/cmake-build/Release/*.clap

  build-mac-suite:
    name: Build macOS App Suite
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Toolchain
      run: pip install hvcc
    - name: Parse Configuration Maps
      run: |
        FOLDER=$(python3 -c "import json; print(json.load(open('config.json'))['folder_path'])")
        PATCH=$(python3 -c "import json; print(json.load(open('config.json'))['target_patch_file'])")
        NAME="${PATCH%.*}"
        echo "TARGET_PATCH=$FOLDER/$PATCH" >> $GITHUB_ENV
        echo "BINARY_NAME=$NAME" >> $GITHUB_ENV
    - name: Translate to JUCE C++
      run: hvcc "${{ env.TARGET_PATCH }}" -g juce -o build/compiled_source --n "${{ env.BINARY_NAME }}"
    - name: Package Images
      run: |
        mkdir -p build/compiled_source/resources
        FOLDER=$(python3 -c "import json; print(json.load(open('config.json'))['folder_path'])")
        find "$FOLDER" -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -exec cp {} build/compiled_source/resources/ \;
    - name: Compile macOS Applications
      run: |
        cd build/compiled_source && mkdir -p cmake-build && cd cmake-build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j2
    - name: Upload macOS Interactive Deliverables
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BINARY_NAME }}-macOS-UI-Package
        path: |
          build/compiled_source/cmake-build/*.app
          build/compiled_source/cmake-build/*.vst3
          build/compiled_source/cmake-build/*.clap
