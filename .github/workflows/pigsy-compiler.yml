  # 3. LINUX MACHINE (NATIVE EXECUTABLE ONLY WITH EXTERNAL PUBLIC LINK)
  build-linux-app:
    name: Build Linux App Only
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Linux Graphic System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libasound2-dev libfreetype6-dev libcurl4-openssl-dev jq curl
    - name: Install Toolchain
      run: pip install hvcc
    - name: Parse Configuration Maps
      run: |
        FOLDER=$(jq -r '.folder_path' config.json)
        PATCH=$(jq -r '.target_patch_file' config.json)
        NAME="${PATCH%.*}"
        echo "TARGET_PATCH=$FOLDER/$PATCH" >> $GITHUB_ENV
        echo "BINARY_NAME=$NAME" >> $GITHUB_ENV
    - name: Translate to JUCE C++
      run: hvcc "${{ env.TARGET_PATCH }}" -g juce -o build/compiled_source --n "${{ env.BINARY_NAME }}"
    - name: Package Images
      run: |
        mkdir -p build/compiled_source/resources
        FOLDER=$(jq -r '.folder_path' config.json)
        find "$FOLDER" -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -exec cp {} build/compiled_source/resources/ \;
    - name: Compile Linux Standalone App
      run: |
        cd build/compiled_source && mkdir -p cmake-build && cd cmake-build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make ${{ env.BINARY_NAME }}_Standalone -j$(nproc)
    
    # NEW STEP: Compresses and uploads the raw file to an open web-sharing link automatically
    - name: Push App to Free Public Download Link
      run: |
        cd build/compiled_source/cmake-build/
        # Bundle everything inside a folder to keep dependencies safe
        mkdir -p Linux_Release_Folder
        cp -r * Linux_Release_Folder/ 2>/dev/null || true
        tar -czf ${{ env.BINARY_NAME }}_Linux_Desktop.tar.gz Linux_Release_Folder
        
        echo "--------------------------------------------------------"
        echo "UPLOAD STATUS:"
        # Uploads using curl straight into GoFile's cloud transmission networks
        curl -F "file=@${{ env.BINARY_NAME }}_Linux_Desktop.tar.gz" https://gofile.io
        echo ""
        echo "--------------------------------------------------------"
