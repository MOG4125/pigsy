name: Pigsy Plugin Compiler

on:
  push:
    branches: [ "main" ]

jobs:
  build-plugins:
    name: Build VST3 and CLAP Binaries
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev jq

    - name: Install Heavy Compiler Collection (hvcc)
      run: |
        pip install --upgrade pip
        pip install hvcc

    - name: Parse Configuration Maps
      id: parse_config
      run: |
        FOLDER_PATH=$(jq -r '.folder_path' config.json)
        PATCH_FILE=$(jq -r '.target_patch_file' config.json)
        
        echo "TARGET_DIR=$FOLDER_PATH" >> $GITHUB_ENV
        echo "TARGET_PATCH=$FOLDER_PATH/$PATCH_FILE" >> $GITHUB_ENV

    - name: Translate Pure Data to C++ Source Code
      run: |
        mkdir -p build
        hvcc "${{ env.TARGET_PATCH }}" -g dpf -o build/compiled_source
        
    - name: Package Embedded Image Assets
      run: |
        mkdir -p build/compiled_source/resources
        find "${{ env.TARGET_DIR }}" -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -exec cp {} build/compiled_source/resources/ \;

    - name: Compile C++ Code into Audio Binary Files
      run: |
        cd build/compiled_source
        mkdir -p cmake-build && cd cmake-build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Upload Completed VST3 and CLAP Plugins
      uses: actions/upload-artifact@v4
      with:
        name: Pigsy-Desktop-Plugins
        path: |
          build/compiled_source/cmake-build/*.vst3
          build/compiled_source/cmake-build/*.clap
